<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>Banner V2 — 4 талик тўр (квадрат)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Playfair+Display:ital,wght@0,600;0,700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  .banner {
    position: relative;
    width: 1080px; height: 1080px;
    overflow: hidden;
    font-family: "Cormorant Garamond", Georgia, serif;
    color: #F3EEE2;
    background:
      radial-gradient(120% 90% at 50% 0%, #124233 0%, #0C2A1F 60%, #08201799 100%),
      #0C2A1F;
  }
  .frame {
    position: absolute; inset: 22px;
    border: 2px solid rgba(205,170,109,0.85);
    box-shadow: inset 0 0 0 5px rgba(205,170,109,0.16);
    pointer-events: none; z-index: 5;
  }
  .top { text-align: center; padding-top: 48px; }
  .wordmark {
    font-family: "Playfair Display", serif; font-style: italic; font-weight: 600;
    font-size: 40px; color: #F6EFDD;
  }
  .headline {
    font-family: "Playfair Display", serif; font-weight: 700;
    font-size: 58px; letter-spacing: 0.08em; color: #CDAA6D;
    margin-top: 8px;
  }
  .headline-uz {
    font-size: 20px; font-style: italic; letter-spacing: 0.30em; text-indent: 0.30em;
    color: #EFE7D2; opacity: 0.9; margin-top: 4px;
  }
  .rule {
    width: 90px; height: 1px; margin: 14px auto 0;
    background: linear-gradient(to right, transparent, #CDAA6D, transparent);
  }
  .grid {
    position: absolute; left: 60px; right: 60px; top: 250px; bottom: 96px;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    gap: 26px;
  }
  .cell {
    position: relative; border-radius: 8px; overflow: hidden;
    border: 2px solid rgba(205,170,109,0.7);
    box-shadow: 0 6px 18px rgba(0,0,0,0.45);
  }
  .cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cell .label {
    position: absolute; left: 0; right: 0; bottom: 0;
    padding: 30px 12px 12px;
    background: linear-gradient(to top, rgba(8,26,19,0.95) 12%, rgba(8,26,19,0.55) 55%, transparent);
    text-align: center;
  }
  .cell .uz {
    font-family: "Playfair Display", serif; font-weight: 600;
    font-size: 27px; color: #F6EFDD; line-height: 1.05;
  }
  .cell .ru {
    font-size: 16px; font-style: italic; color: #CDAA6D; margin-top: 3px;
  }
  .footer {
    position: absolute; left: 0; right: 0; bottom: 42px; text-align: center;
    font-size: 16px; letter-spacing: 0.22em; color: #D9CFB6;
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="frame"></div>
    <div class="top">
      <div class="wordmark">Limonariya</div>
      <div class="headline">ЯНГИ ТАОМЛАР</div>
      <div class="headline-uz">НОВЫЕ БЛЮДА</div>
      <div class="rule"></div>
    </div>
    <div class="grid">
      <div class="cell"><img src="food/dish-lagmon.png" alt="" /><div class="label"><div class="uz">Уйғурча лағмон</div><div class="ru">Уйгурский лагман</div></div></div>
      <div class="cell"><img src="food/dish-manti.png" alt="" /><div class="label"><div class="uz">Уйғур манти</div><div class="ru">Уйгурские манты</div></div></div>
      <div class="cell"><img src="food/dish-pelmen.png" alt="" /><div class="label"><div class="uz">Пельмен шўрво</div><div class="ru">Пельменный суп</div></div></div>
      <div class="cell"><img src="food/dish-qovurma.png" alt="" /><div class="label"><div class="uz">Қовурма лағмон</div><div class="ru">Жареный лагман</div></div></div>
    </div>
    <div class="footer">БОГИШАМОЛ КЎЧАСИ, 109 &nbsp;•&nbsp; 09:00 – 23:00</div>
  </div>
</body>
</html>
