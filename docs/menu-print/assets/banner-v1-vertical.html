<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>Banner V1 — тўлиқ вертикал</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Playfair+Display:ital,wght@0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  .banner {
    position: relative;
    width: 1080px; height: 1920px;
    overflow: hidden;
    font-family: "Cormorant Garamond", Georgia, serif;
    color: #F3EEE2;
    background: #0C2A1F;
  }
  /* full-bleed food background (2x2) */
  .photo-grid {
    position: absolute; inset: 0;
    display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr;
    gap: 3px; background: #CDAA6D;
    z-index: 1;
  }
  .photo-grid img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .scrim {
    position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(to bottom,
      rgba(7,26,19,0.96) 0%, rgba(7,26,19,0.66) 13%, rgba(7,26,19,0.14) 27%,
      rgba(7,26,19,0.10) 58%, rgba(7,26,19,0.60) 80%, rgba(7,26,19,0.97) 100%);
  }
  .frame {
    position: absolute; inset: 26px; z-index: 8; pointer-events: none;
    border: 2px solid rgba(205,170,109,0.9);
    box-shadow: inset 0 0 0 6px rgba(205,170,109,0.16);
  }
  .frame::before { content:""; position:absolute; inset:9px; border:1px solid rgba(205,170,109,0.4); }

  .masthead {
    position: absolute; top: 0; left: 0; right: 0; z-index: 5;
    padding-top: 96px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
  }
  .wordmark {
    font-family: "Playfair Display", serif; font-style: italic; font-weight: 600;
    font-size: 52px; color: #F4ECD8; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.7));
  }
  .wordmark-sub { font-size: 19px; letter-spacing: 0.34em; text-indent: 0.34em; color: #D8B87E; margin-top: 12px; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8)); }
  .orn { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 22px; }
  .orn .l { width: 120px; height: 1px; background: linear-gradient(to right, transparent, #CDAA6D); }
  .orn .l.r { background: linear-gradient(to left, transparent, #CDAA6D); }
  .orn .d { width: 9px; height: 9px; transform: rotate(45deg); background: #CDAA6D; box-shadow: 0 0 8px rgba(205,170,109,0.6); }
  .headline {
    font-family: "Playfair Display", serif; font-weight: 800;
    font-size: 70px; letter-spacing: 0.06em; text-indent: 0.06em; margin-top: 20px; line-height: 1;
    background: linear-gradient(180deg, #F3DEAC 0%, #E7C88C 38%, #C69A55 72%, #B8934F 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 3px 12px rgba(0,0,0,0.85));
  }
  .headline-uz { font-size: 27px; font-style: italic; letter-spacing: 0.04em; color: #EFE7D2; margin-top: 18px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.9)); }

  .names {
    position: absolute; left: 66px; right: 66px; bottom: 150px; z-index: 5;
    display: flex; justify-content: space-between; align-items: flex-start;
  }
  .name { flex: 1; text-align: center; padding: 0 6px; position: relative; }
  .name + .name::before {
    content: ""; position: absolute; left: 0; top: 4px; width: 1px; height: 66px;
    background: linear-gradient(to bottom, transparent, rgba(205,170,109,0.75), transparent);
  }
  .name .mark { width: 8px; height: 8px; transform: rotate(45deg); background: #CDAA6D; margin: 0 auto 12px; box-shadow: 0 0 7px rgba(205,170,109,0.7); }
  .name .uz { font-family: "Playfair Display", serif; font-weight: 700; font-size: 27px; color: #F6EFDD; line-height: 1.12; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.95)); }
  .name .ru { font-size: 17px; font-style: italic; color: #E4C88F; margin-top: 6px; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.9)); }

  .footer {
    position: absolute; left: 0; right: 0; bottom: 78px; text-align: center; z-index: 5;
    font-size: 19px; letter-spacing: 0.24em; text-indent: 0.24em; color: #D6C79F;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.9));
  }
</style>
</head>
<body>
  <div class="banner">
    <div class="photo-grid">
      <img src="food/dish-lagmon.png" alt="" />
      <img src="food/dish-manti.png" alt="" />
      <img src="food/dish-pelmen.png" alt="" />
      <img src="food/dish-qovurma.png" alt="" />
    </div>
    <div class="scrim"></div>
    <div class="frame"></div>

    <div class="masthead">
      <div class="wordmark">Limonariya</div>
      <div class="wordmark-sub">ЯНГИ · УЙҒУР ТАОМЛАРИ</div>
      <div class="orn"><span class="l"></span><span class="d"></span><span class="l r"></span></div>
      <div class="headline">ИССИҚҚИНА ЛАЗЗАТ</div>
      <div class="headline-uz">Қўлда чўзилган лағмон&nbsp;&nbsp;·&nbsp;&nbsp;буғи бурқираган манти</div>
    </div>

    <div class="names">
      <div class="name"><div class="mark"></div><div class="uz">Уйғурча лағмон</div><div class="ru">Уйгурский лагман</div></div>
      <div class="name"><div class="mark"></div><div class="uz">Уйғур манти</div><div class="ru">Уйгурские манты</div></div>
      <div class="name"><div class="mark"></div><div class="uz">Пельмен шўрво</div><div class="ru">Пельменный суп</div></div>
      <div class="name"><div class="mark"></div><div class="uz">Қовурма лағмон</div><div class="ru">Жареный лагман</div></div>
    </div>
    <div class="footer">БОГИШАМОЛ КЎЧАСИ, 109 &nbsp;•&nbsp; 09:00 – 23:00</div>
  </div>
</body>
</html>
