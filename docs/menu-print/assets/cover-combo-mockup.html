<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>La Limonariya — комбо муқова</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Playfair+Display:ital,wght@0,700;1,600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #888; }
  .page {
    position: relative;
    width: 210mm;
    height: 297mm;
    margin: 10mm auto;
    background-image: url("cover-concept-1-emblem.png");
    background-size: cover;
    background-position: center;
    overflow: hidden;
    font-family: "Cormorant Garamond", Georgia, serif;
    color: #F3EEE2;
  }
  .lemon-band {
    position: absolute;
    top: 8.2%;
    left: 12%;
    width: 76%;
  }
  .logo {
    position: absolute;
    top: 25%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 30mm;
    filter: drop-shadow(0 1mm 2mm rgba(0,0,0,0.4));
  }
  .building {
    position: absolute;
    top: 35%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 128mm;
    filter: drop-shadow(0 2mm 3mm rgba(0,0,0,0.35));
  }
  .wordmark {
    position: absolute;
    top: 63%;
    left: 50%;
    transform: translate(-50%, 0);
    font-family: "Playfair Display", Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 32pt;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .wordmark-sub {
    position: absolute;
    top: 69%;
    left: 50%;
    transform: translate(-50%, 0);
    font-family: "Cormorant Garamond", serif;
    font-size: 11pt;
    letter-spacing: 0.55em;
    white-space: nowrap;
    color: #CDAA6D;
  }
  .menu-title {
    position: absolute;
    top: 76%;
    left: 50%;
    transform: translate(-50%, 0);
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    font-size: 26pt;
    letter-spacing: 0.3em;
    color: #CDAA6D;
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .rule {
    position: absolute;
    top: 79.5%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 28mm;
    height: 1px;
    background: #CDAA6D;
    opacity: 0.75;
  }
  .est {
    position: absolute;
    top: 81.5%;
    left: 50%;
    transform: translate(-50%, 0);
    font-family: "Cormorant Garamond", serif;
    font-size: 11pt;
    letter-spacing: 0.4em;
    color: #F3EEE2;
    opacity: 0.9;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="page">
    <img class="lemon-band" src="lemon-band-green-cropped.png" alt="lemon band" />
    <img class="logo" src="logo-transparent.png" alt="logo" />
    <img class="building" src="cover-real-clean-cropped-transparent.png" alt="building" />
    <div class="wordmark">Limonariya</div>
    <div class="wordmark-sub">RESTAURANT</div>
    <div class="menu-title">МЕНЮ</div>
    <div class="rule"></div>
    <div class="est">EST. 2025</div>
  </div>
</body>
</html>
