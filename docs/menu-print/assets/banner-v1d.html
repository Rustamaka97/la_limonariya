<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>Banner V1 — горизонтал</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500;1,600&family=Playfair+Display:ital,wght@0,600;0,700;0,800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  .banner {
    position: relative;
    width: 1920px; height: 1080px;
    overflow: hidden;
    font-family: "Cormorant Garamond", Georgia, serif;
    color: #F3EEE2;
    background: #0C2A1F;
  }
  .photo { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .scrim {
    position: absolute; inset: 0;
    background:
      linear-gradient(to bottom, rgba(8,28,20,0.94) 0%, rgba(8,28,20,0.42) 24%, rgba(8,28,20,0.12) 46%, rgba(8,28,20,0.55) 74%, rgba(8,28,20,0.96) 100%);
  }
  .top-glow {
    position: absolute; top: -230px; left: 50%; transform: translateX(-50%);
    width: 1500px; height: 760px;
    background: radial-gradient(50% 50% at 50% 50%, rgba(7,26,19,0.78) 0%, rgba(7,26,19,0.42) 45%, rgba(7,26,19,0) 72%);
    pointer-events: none;
  }
  .frame {
    position: absolute; inset: 26px;
    border: 2px solid rgba(205,170,109,0.9);
    box-shadow: inset 0 0 0 6px rgba(205,170,109,0.16);
    pointer-events: none; z-index: 8;
  }
  .frame::before {
    content: ""; position: absolute; inset: 9px;
    border: 1px solid rgba(205,170,109,0.4);
  }

  .masthead {
    position: absolute; top: 0; left: 0; right: 0;
    padding-top: 52px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    z-index: 5;
  }
  .wordmark {
    font-family: "Playfair Display", serif; font-style: italic; font-weight: 600;
    font-size: 50px; color: #F4ECD8;
    filter: drop-shadow(0 2px 7px rgba(0,0,0,0.65));
  }
  .wordmark-sub {
    font-size: 18px; letter-spacing: 0.34em; text-indent: 0.34em;
    color: #D8B87E; margin-top: 10px;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.7));
  }
  .orn { display: flex; align-items: center; justify-content: center; gap: 16px; margin-top: 20px; }
  .orn .l { width: 120px; height: 1px; background: linear-gradient(to right, transparent, #CDAA6D); }
  .orn .l.r { background: linear-gradient(to left, transparent, #CDAA6D); }
  .orn .d {
    width: 9px; height: 9px; transform: rotate(45deg);
    background: #CDAA6D; box-shadow: 0 0 8px rgba(205,170,109,0.6);
  }
  .headline {
    font-family: "Playfair Display", serif; font-weight: 800;
    font-size: 72px; letter-spacing: 0.07em; text-indent: 0.07em;
    margin-top: 16px; line-height: 1;
    background: linear-gradient(180deg, #F3DEAC 0%, #E7C88C 38%, #C69A55 72%, #B8934F 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    filter: drop-shadow(0 3px 10px rgba(0,0,0,0.7));
  }
  .headline-uz {
    font-size: 27px; font-style: italic; letter-spacing: 0.06em;
    color: #EFE7D2; margin-top: 16px;
    filter: drop-shadow(0 1px 5px rgba(0,0,0,0.85));
  }

  .names {
    position: absolute; left: 84px; right: 84px; bottom: 84px;
    display: flex; justify-content: space-between; align-items: flex-start;
    z-index: 5;
  }
  .name { flex: 1; text-align: center; padding: 0 10px; position: relative; }
  .name + .name::before {
    content: ""; position: absolute; left: 0; top: 4px;
    width: 1px; height: 72px;
    background: linear-gradient(to bottom, transparent, rgba(205,170,109,0.7), transparent);
  }
  .name .mark {
    width: 8px; height: 8px; transform: rotate(45deg);
    background: #CDAA6D; margin: 0 auto 12px;
    box-shadow: 0 0 7px rgba(205,170,109,0.6);
  }
  .name .uz {
    font-family: "Playfair Display", serif; font-weight: 700;
    font-size: 33px; color: #F6EFDD; line-height: 1.08;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.85));
  }
  .name .ru {
    font-size: 20px; font-style: italic; color: #D8B87E; margin-top: 7px;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8));
  }
  .footer {
    position: absolute; left: 0; right: 0; bottom: 38px; text-align: center;
    font-size: 16px; letter-spacing: 0.26em; text-indent: 0.26em; color: #CDBE9B;
    z-index: 5;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.85));
  }
</style>
</head>
<body>
  <div class="banner">
    <img class="photo" src="food/banner-flatlay.png" alt="" />
    <div class="scrim"></div>
    <div class="top-glow"></div>
    <div class="frame"></div>

    <div class="masthead">
      <div class="wordmark">Limonariya</div>
      <div class="wordmark-sub">ЯНГИ · УЙҒУР ТАОМЛАРИ</div>
      <div class="orn"><span class="l"></span><span class="d"></span><span class="l r"></span></div>
      <div class="headline">ТАТИБ КЎРИНГ, УНУТМАЙСИЗ</div>
      <div class="headline-uz">Бир тотсангиз — қайта келасиз</div>
    </div>

    <div class="names">
      <div class="name"><div class="mark"></div><div class="uz">Уйғурча лағмон</div><div class="ru">Уйгурский лагман</div></div>
      <div class="name"><div class="mark"></div><div class="uz">Уйғур манти</div><div class="ru">Уйгурские манты</div></div>
      <div class="name"><div class="mark"></div><div class="uz">Пельмен шўрво</div><div class="ru">Пельменный суп</div></div>
      <div class="name"><div class="mark"></div><div class="uz">Қовурма лағмон</div><div class="ru">Жареный лагман</div></div>
    </div>
    <div class="footer">БОГИШАМОЛ КЎЧАСИ, 109 &nbsp;•&nbsp; 09:00 – 23:00</div>
  </div>
</body>
</html>
