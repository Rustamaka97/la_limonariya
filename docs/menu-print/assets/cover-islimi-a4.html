<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>La Limonariya — islimi муқова A4 300dpi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  .page {
    position: relative;
    width: 210mm;
    height: 297mm;
    background-image: url("finals/2-islimi-4k.png");
    background-size: 100% 100%;
    overflow: hidden;
    font-family: "Cormorant Garamond", Georgia, serif;
    color: #F3EEE2;
  }
  .band-wrap {
    position: absolute;
    top: 11.6%;
    left: 18%;
    width: 64%;
    padding: 0.65mm 0;
    background: linear-gradient(to bottom, #8f7539 0, #d9b97c 0.32mm, #8f7539 0.65mm, transparent 0.65mm),
                linear-gradient(to top, #8f7539 0, #d9b97c 0.32mm, #8f7539 0.65mm, transparent 0.65mm);
    background-repeat: no-repeat;
    box-shadow: 0 1.2mm 3mm rgba(0,0,0,0.35);
  }
  .band-wrap img {
    display: block;
    width: 100%;
    height: auto;
  }
  .logo {
    position: absolute;
    top: 22.6%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 29.8%;
    filter: drop-shadow(0 0.8mm 1.6mm rgba(0,0,0,0.35));
  }
  .wordmark {
    position: absolute;
    top: 46.5%;
    left: 50%;
    transform: translate(-50%, 0);
    font-family: "Playfair Display", Georgia, serif;
    font-style: italic;
    font-weight: 600;
    font-size: 10.4mm;
    white-space: nowrap;
    color: #F6EFDD;
    text-shadow: 0 0.3mm 0.8mm rgba(0,0,0,0.5);
  }
  .wordmark-sub {
    position: absolute;
    top: 52.9%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 3.2mm;
    letter-spacing: 0.55em;
    text-indent: 0.55em;
    white-space: nowrap;
    color: #CDAA6D;
  }
  .menu-title {
    position: absolute;
    top: 59.9%;
    left: 50%;
    transform: translate(-50%, 0);
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    font-size: 7.4mm;
    letter-spacing: 0.32em;
    text-indent: 0.32em;
    color: #CDAA6D;
    white-space: nowrap;
    text-shadow: 0 0.25mm 0.6mm rgba(0,0,0,0.5);
  }
  .est {
    position: absolute;
    top: 67.7%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 3mm;
    letter-spacing: 0.42em;
    text-indent: 0.42em;
    color: #F3EEE2;
    opacity: 0.92;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="page">
    <div class="band-wrap"><img src="suzani-band-hd.png" alt="suzani band" /></div>
    <img class="logo" src="logo-transparent.png" alt="logo" />
    <div class="wordmark">Limonariya</div>
    <div class="wordmark-sub">RESTAURANT</div>
    <div class="menu-title">МЕНЮ</div>
    <div class="est">EST. 2025</div>
  </div>
</body>
</html>
