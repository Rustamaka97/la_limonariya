<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>La Limonariya — 3D мокап</title>
<style>
  html, body {
    margin: 0; padding: 0;
    width: 1400px; height: 1000px;
    background-image: url("table-bg.png");
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }
  .stage {
    width: 1400px; height: 1000px;
    display: flex;
    align-items: center;
    justify-content: center;
    perspective: 1800px;
  }
  .book {
    position: relative;
    width: 420px;
    height: 596px;
    transform: rotateY(-28deg) rotateX(4deg) rotateZ(1deg);
    transform-style: preserve-3d;
    box-shadow:
      40px 50px 80px rgba(0,0,0,0.55),
      2px 0 0 rgba(0,0,0,0.2);
  }
  .cover-img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 2px 6px 6px 2px;
    display: block;
  }
  .spine {
    position: absolute;
    left: -14px; top: 4px; bottom: 4px;
    width: 14px;
    background: linear-gradient(to right, #06231a, #0b3527);
    transform: rotateY(90deg);
    transform-origin: right;
    border-radius: 2px 0 0 2px;
  }
  .pages {
    position: absolute;
    right: -6px; top: 6px; bottom: 6px;
    width: 6px;
    background: repeating-linear-gradient(to bottom, #efe8d8, #efe8d8 1px, #ddd4bf 1px, #ddd4bf 2px);
    transform: rotateY(-90deg);
    transform-origin: left;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="book">
      <div class="spine"></div>
      <img class="cover-img" src="cover-flat.png" alt="cover" />
      <div class="pages"></div>
    </div>
  </div>
</body>
</html>
