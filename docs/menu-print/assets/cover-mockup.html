<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>La Limonariya — муқова мокапи</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #888; }
  .page {
    position: relative;
    width: 210mm;
    height: 297mm;
    margin: 10mm auto;
    background-image: url("cover-concept-4-ikat.png");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    overflow: hidden;
    font-family: Georgia, "Times New Roman", serif;
  }
  .logo {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 78mm;
    filter: drop-shadow(0 2mm 3mm rgba(0,0,0,0.4));
  }
  .wordmark {
    position: absolute;
    top: 47%;
    left: 50%;
    transform: translate(-50%, 0);
    color: #F6F1E3;
    font-size: 30pt;
    font-style: italic;
    white-space: nowrap;
    text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  }
  .wordmark-sub {
    position: absolute;
    top: 53.5%;
    left: 50%;
    transform: translate(-50%, 0);
    color: #CDAA6D;
    font-size: 10pt;
    letter-spacing: 0.5em;
    white-space: nowrap;
  }
  .menu-title {
    position: absolute;
    top: 61%;
    left: 50%;
    transform: translate(-50%, 0);
    color: #CDAA6D;
    font-size: 22pt;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    white-space: nowrap;
    text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  }
  .rule {
    position: absolute;
    top: 67%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 28mm;
    height: 1px;
    background: #CDAA6D;
    opacity: 0.75;
  }
  .est {
    position: absolute;
    top: 69%;
    left: 50%;
    transform: translate(-50%, 0);
    color: #F6F1E3;
    font-size: 10.5pt;
    letter-spacing: 0.3em;
    opacity: 0.85;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="page">
    <img class="logo" src="logo-transparent.png" alt="logo" />
    <div class="wordmark">Limonariya</div>
    <div class="wordmark-sub">RESTAURANT</div>
    <div class="menu-title">МЕНЮ</div>
    <div class="rule"></div>
    <div class="est">EST. 2025</div>
  </div>
</body>
</html>
