<!doctype html>
<html lang="uz">
<head>
<meta charset="utf-8" />
<title>La Limonariya — реал муқова мокапи</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #888; }
  .page {
    position: relative;
    width: 210mm;
    height: 297mm;
    margin: 10mm auto;
    background-color: #0B4431;
    overflow: hidden;
    font-family: Georgia, "Times New Roman", serif;
    color: #F3EEE2;
  }
  .logo {
    position: absolute;
    top: 8%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 24mm;
  }
  .building {
    position: absolute;
    top: 22%;
    left: 50%;
    transform: translate(-50%, 0);
    width: 140mm;
  }
  .wordmark {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 28pt;
    font-style: italic;
    white-space: nowrap;
  }
  .wordmark-sub {
    position: absolute;
    top: 60.5%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 10pt;
    letter-spacing: 0.5em;
    white-space: nowrap;
    color: #CDAA6D;
  }
  .menu-title {
    position: absolute;
    top: 69%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 40pt;
    letter-spacing: 0.06em;
    font-weight: bold;
    font-family: Georgia, serif;
    white-space: nowrap;
  }
  .address {
    position: absolute;
    top: 83%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 10pt;
    letter-spacing: 0.15em;
    text-align: center;
    line-height: 1.8;
    white-space: nowrap;
  }
  .hours {
    position: absolute;
    top: 87.5%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 8.5pt;
    letter-spacing: 0.15em;
    opacity: 0.85;
    white-space: nowrap;
  }
  .est {
    position: absolute;
    top: 92.5%;
    left: 50%;
    transform: translate(-50%, 0);
    font-size: 9pt;
    letter-spacing: 0.35em;
    color: #CDAA6D;
    white-space: nowrap;
  }
</style>
</head>
<body>
  <div class="page">
    <img class="logo" src="logo-transparent.png" alt="logo" />
    <img class="building" src="cover-real-clean-cropped.png" alt="building" />
    <div class="wordmark">Limonariya</div>
    <div class="wordmark-sub">RESTAURANT</div>
    <div class="menu-title">MENU</div>
    <div class="address">НАВОИЙСКАЯ ОБЛАСТЬ, УЛИЦА БОГИШАМОЛ - 109</div>
    <div class="hours">КАЖДЫЙ ДЕНЬ 09:00 – 23:00</div>
    <div class="est">EST. 2025</div>
  </div>
</body>
</html>
