name: limonariya

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: limon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-limon_dev}
      POSTGRES_DB: limonariya
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limon -d limonariya"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: limonariya-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://limon:${POSTGRES_PASSWORD:-limon_dev}@postgres:5432/limonariya
      PORT: 3000
      PIN_PEPPER: ${PIN_PEPPER:-dev-pepper-change-me}
      BOOTSTRAP_DIRECTOR_PIN: ${BOOTSTRAP_DIRECTOR_PIN:-1234}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_IDS: ${TELEGRAM_CHAT_IDS:-}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    image: limonariya-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    depends_on:
      - api

  # Оммавий сайтлар (POS'дан алоҳида): lalimonariya.uz → ресторан лендинги,
  # qr.lalimonariya.uz → QR-меню. Host bo'yicha Caddy yo'naltiradi.
  sites:
    build:
      context: ./sites
      dockerfile: Dockerfile
    image: limonariya-sites
    restart: unless-stopped
    ports:
      - "${SITES_PORT:-8090}:80"

  # Тунги захира — касса маълумоти = пул. Ҳар кеча 03:00 (сервер вақти) pg_dump
  # → ./backups/limonariya-YYYY-MM-DD.sql.gz, 14 кундан эскиси ўчади. Тиклаш:
  #   gunzip -c backups/limonariya-XXXX.sql.gz | docker compose exec -T postgres psql -U limon -d limonariya
  backup:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-limon_dev}
    volumes:
      - ./backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          now=$$(date +%s)
          target=$$(date -d "03:00 next day" +%s 2>/dev/null || echo $$((now + 86400)))
          # бугун ҳали 03:00 бўлмаган бўлса — бугунгисига
          today=$$(date -d "03:00" +%s 2>/dev/null || echo 0)
          if [ "$$today" -gt "$$now" ]; then target=$$today; fi
          sleep $$((target - now))
          f=/backups/limonariya-$$(date +%F).sql.gz
          pg_dump -h postgres -U limon -d limonariya | gzip > "$$f.tmp" && mv "$$f.tmp" "$$f" \
            && echo "[backup] ok: $$f ($$(du -h "$$f" | cut -f1))" \
            || echo "[backup] XATO: pg_dump muvaffaqiyatsiz"
          find /backups -name 'limonariya-*.sql.gz' -mtime +14 -delete
        done

volumes:
  pgdata:
