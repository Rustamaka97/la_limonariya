<!doctype html>
<html lang="uz">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>La Limonariya POS</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
        display: grid;
        place-items: center;
        background: #0e4037;
        color: #fdf8f2;
        font-family: system-ui, sans-serif;
        text-align: center;
      }
      .box { max-width: 440px; padding: 24px; }
      h1 { font-size: 22px; margin: 0 0 8px; }
      p { color: #cbd5cc; line-height: 1.5; }
      button {
        margin-top: 20px;
        padding: 12px 24px;
        border: 0;
        border-radius: 12px;
        background: #d4a24e;
        color: #0e4037;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h1>Серверга уланиб бўлмади</h1>
      <p>Зал серверини ва тармоқни (Wi-Fi/кабель) текширинг, кейин қайта уланинг.</p>
      <button onclick="location.reload()">Қайта уланиш</button>
    </div>
  </body>
</html>
